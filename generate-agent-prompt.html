<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Agent - GyanaM Store</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .back-link {
      color: #64ffda;
      text-decoration: none;
      font-size: 16px;
    }

    .chat-container {
      flex: 1;
      max-width: 700px;
      margin: 20px auto;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      max-height: 60vh;
    }

    .message {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 10px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-width: 90%;
    }

    .user {
      background-color: #4CAF50;
      align-self: flex-end;
      color: #000;
    }

    .message.bot h1, .message.bot h2, .message.bot h3 {
      color: #64ffda;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    .message.bot h1 { font-size: 1.5rem; }
    .message.bot h2 { font-size: 1.3rem; }
    .message.bot h3 { font-size: 1.1rem; }

    .message.bot p {
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .message.bot ul, .message.bot ol {
      margin-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .message.bot li {
      margin-bottom: 0.5rem;
    }

    .message.bot code {
      background: rgba(0, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #64ffda;
    }

    .message.bot pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .message.bot pre code {
      background: none;
      padding: 0;
    }

    .message.bot blockquote {
      border-left: 4px solid #64ffda;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #b0b0b0;
      font-style: italic;
    }

    .message.bot strong {
      color: #bb86fc;
      font-weight: bold;
    }

    .message.typing {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64ffda;
      font-style: italic;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: #64ffda;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    .typing-dot:nth-child(3) { animation-delay: 0s; }

    @keyframes typing {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .message.skeleton {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 12px 16px;
      animation: pulse 2s infinite;
    }

    .skeleton-line {
      height: 16px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }
    .skeleton-line.long { width: 100%; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .error-message {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 10px;
      color: #ff6b6b;
    }

    .retry-button {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 8px;
      transition: background 0.3s ease;
    }

    .retry-button:hover {
      background: #e55a5a;
    }

    .chat-form {
      display: flex;
      padding: 10px;
      gap: 8px;
      max-width: 700px;
      margin: 0 auto;
    }

    .chat-input {
      flex: 1;
      padding: 14px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    .chat-button {
      background: linear-gradient(90deg, #00c9ff, #92fe9d);
      border: none;
      padding: 14px 20px;
      font-size: 16px;
      color: #000;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .chat-button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-link">← Back to Home</a>
    <h1>🧠 Build Great Prompts for Your Agent</h1>
  </div>

  <div class="chat-container" id="chatBox">
    <div class="message bot">
      Hello legend! 👋<br><br>
      Let's start with understanding the role of the agent.<br><br>
      – What do you want this AI agent to act as?<br>
      – What kind of requests or situations will this agent typically handle?
    </div>
  </div>

  <form class="chat-form" id="chatForm">
    <input type="text" class="chat-input" id="chatInput" placeholder="Type your reply here..." required />
    <button type="submit" class="chat-button">Send</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const chatBox = document.getElementById('chatBox');
    const form = document.getElementById('chatForm');
    const input = document.getElementById('chatInput');

    function appendMessage(text, type, isSkeleton = false) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;

      if (type === 'typing') {
        msg.innerHTML = `
          <div class="typing-dots">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
          <span>AI is thinking...</span>
        `;
      } else if (type === 'skeleton') {
        msg.innerHTML = `
          <div class="skeleton-line long"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
        `;
      } else if (type === 'error') {
        msg.innerHTML = `
          <div class="error-message">
            ${text}
            <button class="retry-button" onclick="retryLastMessage()">Retry</button>
          </div>
        `;
      } else if (type === 'bot') {
        msg.innerHTML = marked.parse(text);
      } else {
        msg.textContent = text;
      }

      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msg;
    }

    function removeTyping() {
      const typingMsg = document.querySelector('.message.typing');
      if (typingMsg) typingMsg.remove();
    }

    function showSkeletonLoader() {
      return appendMessage('', 'skeleton');
    }

    function replaceWithContent(skeletonElement, content, type = 'bot') {
      skeletonElement.className = `message ${type}`;
      if (type === 'bot') {
        skeletonElement.innerHTML = marked.parse(content);
      } else if (type === 'error') {
        skeletonElement.innerHTML = `
          <div class="error-message">
            ${content}
            <button class="retry-button" onclick="retryLastMessage()">Retry</button>
          </div>
        `;
      } else {
        skeletonElement.textContent = content;
      }
    }

    let lastUserMessage = '';
    let lastSkeletonElement = null;

    function retryLastMessage() {
      if (lastUserMessage) {
        sendMessage(lastUserMessage);
      }
    }

    async function sendMessage(userText) {
      lastUserMessage = userText;

      // Show typing indicator first
      appendMessage('', 'typing');
      setTimeout(() => {
        removeTyping();
        // Then show skeleton loader
        lastSkeletonElement = showSkeletonLoader();

        // Simulate processing delay for better UX
        setTimeout(() => {
          processMessage(userText);
        }, 500);
      }, 1000);
    }

    async function processMessage(userText) {
      try {
        const response = await fetch('https://primary-production-da3f.up.railway.app/webhook/30b0b7f8-d5df-459d-bcb7-a8fdd0594ce3', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idea: userText })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        const output = data.output || data.response || JSON.stringify(data);
        const formattedOutput = String(output);

        replaceWithContent(lastSkeletonElement, formattedOutput, 'bot');
      } catch (err) {
        console.error('Webhook error:', err);
        replaceWithContent(lastSkeletonElement, `⚠️ ${err.message || 'Something went wrong. Please try again.'}`, 'error');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const userText = input.value.trim();
      if (!userText) return;

      appendMessage(userText, 'user');
      input.value = '';

      sendMessage(userText);
    });
  </script>
</body>
</html>
